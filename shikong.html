<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>失控陀螺爭霸賽</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

:root {
  --red:      #ff1e2d;
  --red-glow: rgba(255,30,45,0.55);
  --red-dim:  #7a0010;
  --blue:     #1565ff;
  --blue-glow:rgba(21,101,255,0.55);
  --blue-dim: #062a80;
  --bg:       #06060e;
  --panel:    #0d0d1a;
  --border:   #1e1e30;
  --text:     #e8e8f8;
  --muted:    #555570;
  --gold:     #ffd700;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* spinning bg gyro effect */
body::before {
  content:'';
  position:fixed;
  top:50%; left:50%;
  width:140vmax; height:140vmax;
  transform:translate(-50%,-50%);
  background: conic-gradient(
    from 0deg,
    rgba(255,30,45,0.04) 0deg,
    transparent 30deg,
    rgba(21,101,255,0.04) 180deg,
    transparent 210deg,
    rgba(255,30,45,0.03) 360deg
  );
  animation: spinBg 20s linear infinite;
  pointer-events:none;
  z-index:0;
}
@keyframes spinBg { to { transform: translate(-50%,-50%) rotate(360deg); } }

body::after {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, transparent 40%, var(--bg) 100%);
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
.site-header {
  position:relative;
  z-index:10;
  text-align:center;
  padding:28px 16px 10px;
}

.gyro-icon {
  font-size: 2.5rem;
  display: inline-block;
  animation: gyroSpin 2s linear infinite;
  line-height:1;
}
@keyframes gyroSpin { to { transform: rotate(360deg); } }

.site-title {
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size: clamp(1.4rem,5vw,3rem);
  letter-spacing:0.08em;
  margin-top:6px;
  background: linear-gradient(90deg, var(--red) 0%, #fff 40%, var(--blue) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
}

.site-sub {
  font-size:0.7rem;
  letter-spacing:0.25em;
  color: var(--muted);
  text-transform:uppercase;
  margin-top:6px;
}

/* ── NAV TABS ── */
.nav {
  position:relative;
  z-index:10;
  display:flex;
  justify-content:center;
  gap:6px;
  padding:14px 16px;
  flex-wrap:wrap;
}

.nav-btn {
  padding:7px 18px;
  border-radius:3px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--muted);
  font-family:'Noto Sans TC',sans-serif;
  font-size:0.75rem;
  font-weight:700;
  letter-spacing:0.12em;
  cursor:pointer;
  transition:all 0.18s;
  text-transform:uppercase;
}
.nav-btn:hover { color:var(--text); border-color:var(--muted); }
.nav-btn.active-red  { background:var(--red);  border-color:var(--red);  color:#fff; box-shadow:0 0 12px var(--red-glow); }
.nav-btn.active-blue { background:var(--blue); border-color:var(--blue); color:#fff; box-shadow:0 0 12px var(--blue-glow); }

/* ── PAGE SECTIONS ── */
.page { display:none; position:relative; z-index:5; }
.page.active { display:block; }

/* ══════════════════════════════════════════
   LIVE SCOREBOARD
══════════════════════════════════════════ */
.scoreboard {
  max-width:860px;
  margin:0 auto;
  padding:16px 16px 40px;
}

.match-selector-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.match-selector-row label {
  font-size:0.72rem;
  color:var(--muted);
  letter-spacing:0.15em;
  text-transform:uppercase;
}

.match-select {
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  padding:6px 12px;
  border-radius:4px;
  font-family:'Noto Sans TC',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  cursor:pointer;
  min-width:180px;
}

/* big score panel */
.live-panel {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:0;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  box-shadow:
    inset 4px 0 30px rgba(255,30,45,0.08),
    inset -4px 0 30px rgba(21,101,255,0.08);
  position:relative;
}

.live-panel::before {
  content:'';
  position:absolute;
  top:0; left:50%;
  transform:translateX(-50%);
  width:1px;
  height:100%;
  background:linear-gradient(to bottom, transparent, var(--border) 20%, var(--border) 80%, transparent);
}

.side {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 16px 24px;
  gap:10px;
  position:relative;
}

.side.red-side  { background: linear-gradient(135deg, rgba(255,30,45,0.12) 0%, transparent 70%); }
.side.blue-side { background: linear-gradient(225deg, rgba(21,101,255,0.12) 0%, transparent 70%); }

.side-label {
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:0.25em;
  text-transform:uppercase;
}
.red-side  .side-label { color:var(--red); }
.blue-side .side-label { color:var(--blue); }

.team-name-live {
  font-family:'Orbitron',sans-serif;
  font-weight:700;
  font-size:clamp(0.9rem,3vw,1.5rem);
  text-align:center;
  word-break:break-all;
  min-height:2em;
  display:flex;
  align-items:center;
  justify-content:center;
}

.red-side  .team-name-live { color:#fff; text-shadow:0 0 20px var(--red-glow); }
.blue-side .team-name-live { color:#fff; text-shadow:0 0 20px var(--blue-glow); }

.big-score {
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  font-size:clamp(4rem,14vw,8rem);
  line-height:1;
  transition:all 0.15s;
}

.red-side  .big-score { color:var(--red);  text-shadow:0 0 40px var(--red-glow),  0 0 80px rgba(255,30,45,0.3); }
.blue-side .big-score { color:var(--blue); text-shadow:0 0 40px var(--blue-glow), 0 0 80px rgba(21,101,255,0.3); }

.big-score.bump {
  animation: scoreBump 0.25s ease-out;
}
@keyframes scoreBump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}

.btn-row {
  display:flex;
  gap:8px;
  margin-top:4px;
}

.score-btn {
  width:44px;
  height:44px;
  border-radius:6px;
  border:2px solid;
  background:transparent;
  font-size:1.4rem;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.15s;
  line-height:1;
  font-family:'Orbitron',sans-serif;
}

.red-side  .score-btn { border-color:var(--red-dim);  color:var(--red); }
.blue-side .score-btn { border-color:var(--blue-dim); color:var(--blue); }
.red-side  .score-btn:hover { background:var(--red);  color:#fff; box-shadow:0 0 16px var(--red-glow); }
.blue-side .score-btn:hover { background:var(--blue); color:#fff; box-shadow:0 0 16px var(--blue-glow); }

.score-btn.minus { font-size:1.8rem; }

.win-flash {
  font-family:'Orbitron',sans-serif;
  font-size:0.65rem;
  font-weight:900;
  letter-spacing:0.2em;
  padding:4px 10px;
  border-radius:3px;
  text-transform:uppercase;
  opacity:0;
  transition:opacity 0.3s;
  min-height:22px;
}
.win-flash.show { opacity:1; }
.red-side  .win-flash { background:var(--red);  color:#fff; }
.blue-side .win-flash { background:var(--blue); color:#fff; }

/* center vs */
.vs-col {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 12px;
  gap:14px;
  min-width:80px;
}

.vs-text {
  font-family:'Orbitron',sans-serif;
  font-size:1.6rem;
  font-weight:900;
  color:var(--muted);
  letter-spacing:0.1em;
}

.match-info-badge {
  font-size:0.58rem;
  letter-spacing:0.15em;
  color:var(--muted);
  text-transform:uppercase;
  text-align:center;
  line-height:1.6;
}

.round-badge {
  padding:4px 8px;
  border:1px solid var(--border);
  border-radius:3px;
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:0.1em;
  color:var(--text);
  background:var(--bg);
  text-align:center;
}

/* action buttons */
.action-row {
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:16px;
  flex-wrap:wrap;
}

.action-btn {
  padding:9px 20px;
  border-radius:4px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
  font-weight:700;
  font-size:0.78rem;
  cursor:pointer;
  letter-spacing:0.08em;
  transition:all 0.18s;
}
.action-btn:hover { background:var(--border); }
.action-btn.confirm-btn {
  background:linear-gradient(90deg, var(--red-dim), var(--blue-dim));
  border-color:transparent;
  color:#fff;
}
.action-btn.confirm-btn:hover {
  background:linear-gradient(90deg, var(--red), var(--blue));
  box-shadow:0 0 20px rgba(150,50,150,0.4);
}

/* ══════════════════════════════════════════
   16強 BRACKET
══════════════════════════════════════════ */
.bracket-page { padding:10px 16px 40px; }

.round-heading {
  text-align:center;
  font-family:'Orbitron',sans-serif;
  font-size:0.85rem;
  font-weight:700;
  letter-spacing:0.2em;
  color:var(--muted);
  margin:16px 0 12px;
  text-transform:uppercase;
  position:relative;
}
.round-heading::before,.round-heading::after {
  content:'';
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:var(--border);
}
.round-heading::before { left:0; }
.round-heading::after  { right:0; }

.matches-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap:10px;
  max-width:1200px;
  margin:0 auto;
}

/* bracket match card */
.bcard {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:7px;
  overflow:hidden;
  transition:box-shadow 0.2s;
  cursor:pointer;
}
.bcard:hover { box-shadow:0 0 0 1px var(--muted); }
.bcard.is-live { box-shadow:0 0 0 1px var(--gold), 0 0 16px rgba(255,215,0,0.2); }

.bcard-label {
  padding:5px 10px;
  font-size:0.58rem;
  letter-spacing:0.18em;
  color:var(--muted);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-transform:uppercase;
}

.live-tag {
  font-size:0.55rem;
  background:var(--gold);
  color:#000;
  padding:1px 5px;
