<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失控事務所積分錦標賽</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --table-header: #2f3542;
            --table-hover: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
            letter-spacing: 2px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow-x: auto;
        }

        /* 新增的設定區塊樣式 */
        .config-bar {
            width: 100%;
            max-width: 950px;
            background-color: #2f3542;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-sizing: border-box;
        }

        .config-bar label {
            font-weight: bold;
            color: #ffa502;
            font-size: 1.1rem;
        }

        .config-bar input {
            background-color: #1a1a1a;
            border: 1px solid #555;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 1rem;
            width: 100px;
            text-align: center;
            font-weight: bold;
        }

        .config-bar input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 1.1rem;
            min-width: 700px;
        }

        th, td {
            padding: 15px 10px;
            border-bottom: 1px solid #444;
            vertical-align: middle;
        }

        th {
            background-color: var(--table-header);
            color: #ffa502;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .sortable:hover {
            background-color: #3e4452;
        }

        .sort-icon {
            font-size: 0.9rem;
            margin-left: 5px;
            color: #ccc;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: var(--table-hover);
        }

        .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.3rem; }
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 1.2rem; }
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 1.15rem; }
        
        .hp-bar-container {
            width: 100px;
            background-color: #444;
            border-radius: 4px;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
            overflow: hidden;
        }
        .hp-bar {
            height: 8px;
            background-color: #2ed573;
            transition: width 0.2s ease;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            font-size: 0.9rem;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            opacity: 0.8;
        }

        .btn-hp-add { background-color: #2ed573; color: #000; }
        .btn-hp-sub { background-color: #ff4757; }
        .btn-pt-add { background-color: #1e90ff; }
        .btn-pt-sub { background-color: #ff6348; }
        .btn-edit { background-color: #747d8c; }

    </style>
</head>
<body>

    <h1>失控事務所積分錦標賽</h1>

    <!-- 頂部設定列 -->
    <div class="config-bar">
        <label for="max-hp-input">🩸 血量顯示滿分上限：</label>
        <input type="number" id="max-hp-input" value="200" min="1" oninput="updateMaxHp(this.value)">
        <span style="color: #aaa; font-size: 0.9rem;">(變更此數值可即時調整下方血量條的滿血比例基準)</span>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>參賽者</th>
                    <th id="th-hp" class="sortable" onclick="toggleHpSort()">血量 <span id="sort-direction" class="sort-icon">↕</span></th>
                    <th>已獲得積分</th>
                    <th>名次</th>
                    <th>操作 (變更數值)</th>
                </tr>
            </thead>
            <tbody id="tournament-data">
                <!-- 資料將由 JavaScript 動態渲染 -->
            </tbody>
        </table>
    </div>

    <script>
        // 參賽者初始資料
        let participants = [
            { name: "emily", hp: 12, points: 0 },
            { name: "Jamie", hp: 12,  points: 0 },
            { name: "怡", hp: 11, points: 0 },
            { name: "wei", hp: 9 , points: 0 },
            { name: "NI", hp: 1, points: 0 },
            { name: "翠翠", hp: 12, points: 0 },
            { name: "花花", hp: 1, points: 0 },
            { name: "大學", hp: 9, points: 0 },
            { name: "難姐", hp: 11, points: 0 },
            { name: "亞", hp: 6,  points: 0 }   
        ];

        // 全域血量滿分變數 (預設 200)
        let maxHp = 12;

        // 排序狀態：0 = 按積分排名, 1 = 血量降序, -1 = 血量升序
        let hpSortDirection = 0; 

        // 初始化
        function init() {
            updateDataAndRender();
        }

        // 更新最大血量設定
        function updateMaxHp(value) {
            let val = parseInt(value);
            if (!isNaN(val) && val > 0) {
                maxHp = val;
                renderTable(); // 重新渲染血量條
            }
        }

        // 核心邏輯：更新名次 -> 套用當前排序 -> 渲染畫面
        function updateDataAndRender() {
            calculateRanks();
            applyCurrentSort();
            renderTable();
        }

        // 計算名次 (只依據積分)
        function calculateRanks() {
            let sortedByPoints = [...participants].sort((a, b) => b.points - a.points);
            let currentRank = 1;
            
            for (let i = 0; i < sortedByPoints.length; i++) {
                if (i > 0 && sortedByPoints[i].points < sortedByPoints[i - 1].points) {
                    currentRank = i + 1;
                }
                let originalObj = participants.find(p => p.name === sortedByPoints[i].name);
                if (originalObj) {
                    originalObj.rank = currentRank;
                }
            }
        }

        // 套用目前的排序規則
        function applyCurrentSort() {
            if (hpSortDirection === 1) {
                participants.sort((a, b) => b.hp - a.hp); 
            } else if (hpSortDirection === -1) {
                participants.sort((a, b) => a.hp - b.hp); 
            } else {
                participants.sort((a, b) => b.points - a.points); 
            }
        }

        // 使用者點擊標題切換血量排序
        function toggleHpSort() {
            const icon = document.getElementById('sort-direction');
            if (hpSortDirection === 0 || hpSortDirection === -1) {
                hpSortDirection = 1;
                icon.innerText = "▼";
            } else {
                hpSortDirection = -1;
                icon.innerText = "▲";
            }
            updateDataAndRender();
        }

        // 修改數值的功能 (精簡為固定加減 1 分/點)
        function changeValue(name, type, amount) {
            let player = participants.find(p => p.name === name);
            if (player) {
                if (type === 'hp') {
                    player.hp += amount;
                    if (player.hp < 0) player.hp = 0; 
                } else if (type === 'points') {
                    player.points += amount;
                    if (player.points < 0) player.points = 0; 
                }
                updateDataAndRender();
            }
        }

        // 自訂編輯數值的功能
        function customEdit(name) {
            let player = participants.find(p => p.name === name);
            if (player) {
                let newHp = prompt(`請輸入【${player.name}】的最新血量：`, player.hp);
                if (newHp !== null && newHp.trim() !== "" && !isNaN(newHp)) {
                    player.hp = parseInt(newHp);
                }

                let newPoints = prompt(`請輸入【${player.name}】的最新積分：`, player.points);
                if (newPoints !== null && newPoints.trim() !== "" && !isNaN(newPoints)) {
                    player.points = parseInt(newPoints);
                }
                
                if (player.hp < 0) player.hp = 0;
                if (player.points < 0) player.points = 0;

                updateDataAndRender();
            }
        }

        // 渲染表格內容
        function renderTable() {
            const tbody = document.getElementById('tournament-data');
            tbody.innerHTML = '';

            participants.forEach(p => {
                const tr = document.createElement('tr');

                let rankClass = '';
                if (p.rank === 1) rankClass = 'rank-1';
                else if (p.rank === 2) rankClass = 'rank-2';
                else if (p.rank === 3) rankClass = 'rank-3';

                // 根據動態設定的 maxHp 計算百分比
                let hpPercent = Math.min((p.hp / maxHp) * 100, 100);
                if (hpPercent < 0) hpPercent = 0;

                tr.innerHTML = `
                    <td><strong>${p.name}</strong></td>
                    <td>
                        <span style="display:inline-block; width:35px; text-align:right;">${p.hp}</span>
                        <div class="hp-bar-container">
                            <div class="hp-bar" style="width: ${hpPercent}%;"></div>
                        </div>
                    </td>
                    <td>${p.points} 分</td>
                    <td class="${rankClass}">第 ${p.rank} 名</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-hp-add" onclick="changeValue('${p.name}', 'hp', 1)">+1 血</button>
                            <button class="btn-hp-sub" onclick="changeValue('${p.name}', 'hp', -1)">-1 血</button>
                            <button class="btn-pt-add" onclick="changeValue('${p.name}', 'points', 1)">+1 分</button>
                            <button class="btn-pt-sub" onclick="changeValue('${p.name}', 'points', -1)">-1 分</button>
                            <button class="btn-edit" onclick="customEdit('${p.name}')">✏️ 自訂</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 啟動程式
        init();
    </script>
</body>
</html>
