<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失控事務所積分錦標賽</title>
    
    <!-- 鎖定 Google Fonts 公開字型：Orbitron 與 思源黑體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-color: #ffffff;
            --accent-color: #ff4757;
            --table-header: #2f3542;
            --table-hover: #333333;
        }

        body {
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
            letter-spacing: 2px;
            text-align: center;
        }

        h2 {
            color: #ffa502;
            font-size: 1.4rem;
            margin: 25px 0 10px 0;
            align-self: flex-start;
            width: 100%;
            max-width: 1150px;
            letter-spacing: 1px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .container {
            width: 100%;
            max-width: 1150px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* 讓表格擁有獨立的橫向滾動條 */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        /* 設定控制列 */
        .config-bar {
            width: 100%;
            max-width: 1150px;
            background-color: #2f3542;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 15px;
        }

        .config-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-bar label {
            font-weight: bold;
            color: #ffa502;
            font-size: 1rem;
        }

        .config-bar input, .config-bar select {
            background-color: #1a1a1a;
            border: 1px solid #555;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        .config-bar select {
            color: #1e90ff;
            cursor: pointer;
        }

        .config-bar input {
            width: 60px;
            text-align: center;
        }

        .config-bar input:focus, .config-bar select:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 1.1rem;
        }

        th, td {
            padding: 14px 10px;
            border-bottom: 1px solid #444;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            background-color: var(--table-header);
            color: #ffa502;
            font-weight: bold;
            letter-spacing: 1px;
        }

        th.hp-header {
            color: #2ed573;
            text-shadow: 0 0 5px rgba(46, 213, 115, 0.3);
        }

        tbody tr {
            transition: background-color 0.15s;
        }

        tbody tr:hover {
            background-color: var(--table-hover);
        }

        /* 名次特殊顏色 */
        .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.3rem; }
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 1.2rem; }
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 1.15rem; }
        
        /* 血條視覺 */
        .hp-bar-container {
            width: 80px;
            background-color: #444;
            border-radius: 4px;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
            overflow: hidden;
        }
        .hp-bar {
            height: 8px;
            background-color: #2ed573;
            transition: width 0.2s ease;
        }

        /* 下方明細表的專屬微調 */
        .round-cell {
            font-family: 'Orbitron', sans-serif;
            color: #1e90ff;
            font-weight: bold;
        }
        .round-cell.has-value {
            color: #ffa502;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            font-size: 0.9rem;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            opacity: 0.8;
        }

        .btn-hp-add { background-color: #2ed573; color: #000; }
        .btn-hp-sub { background-color: #ff4757; }
        .btn-pt-add { background-color: #1e90ff; }
        .btn-pt-sub { background-color: #ff6348; }
        .btn-add-round { background-color: #2ed573; color: #000; }
        .btn-edit { background-color: #747d8c; }
        .btn-reset { background-color: #747d8c; color: #fff; padding: 6px 10px; font-size: 0.85rem;}

    </style>
</head>
<body>

    <h1>失控事務所積分錦標賽</h1>

    <!-- 頂部設定列 -->
    <div class="config-bar">
        <div class="config-left">
            <!-- 血量上限設定 -->
            <div class="config-item">
                <label for="max-hp-input">🩸 血量上限：</label>
                <input type="number" id="max-hp-input" value="20" min="1" oninput="updateMaxHp(this.value)">
            </div>
            
            <!-- 當前賽局選擇器 -->
            <div class="config-item">
                <label for="round-select">🎮 目前管理局數：</label>
                <select id="round-select" onchange="changeCurrentRound(this.value)">
                    <!-- 由 JS 動態生成 -->
                </select>
            </div>

            <!-- 新增局數按鈕 -->
            <button class="btn-add-round" onclick="addNewRound()">➕ 新增局數</button>
        </div>
        
        <!-- 重設按鈕 -->
        <button class="btn-reset" onclick="resetToDefault()">🔄 全賽局重設</button>
    </div>

    <!-- 上方區塊：操作與即時排行 -->
    <h2>⚔️ 實時對戰操作面板 (依血量排序)</h2>
    <div class="container">
        <div class="table-wrapper">
            <table id="top-table">
                <thead>
                    <tr>
                        <th>參賽者</th>
                        <th class="hp-header">血量 (▼)</th>
                        <th>已獲得積分</th>
                        <th>名次</th>
                        <th>操作 (變更數值)</th>
                    </tr>
                </thead>
                <tbody id="top-table-body">
                    <!-- 由 JS 動態渲染 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 下方區塊：各局數據明細 -->
    <h2>📊 各局得分明細數據大表</h2>
    <div class="container">
        <div class="table-wrapper">
            <table id="bottom-table">
                <thead id="bottom-table-head">
                    <!-- 由 JS 動態生成各局欄位 -->
                </thead>
                <tbody id="bottom-table-body">
                    <!-- 由 JS 動態渲染 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 初始名單 (純淨名單：無內嵌原始分數)
        const defaultParticipants = [
            { name: "emily", hp: 12, points: 0 },
            { name: "Jamie", hp: 12,  points: 0 },
            { name: "怡", hp: 11, points: 0 },
            { name: "wei", hp: 9 , points: 0 },
            { name: "NI", hp: 1, points: 0 },
            { name: "翠翠", hp: 12, points: 0 },
            { name: "花花", hp: 1, points: 0 },
            { name: "大學", hp: 9, points: 0 },
            { name: "難姐", hp: 11, points: 0 },
            { name: "亞", hp: 6,  points: 0 }  
        ];
        
        const defaultMaxHp = 20;
        const defaultTotalRounds = 10;

        let participants = [];
        let maxHp = 20;
        let totalRounds = 10;
        let currentRound = 1; 

        // 初始化
        function init() {
            const savedPlayers = localStorage.getItem('sk_tour_v6_players');
            const savedMaxHp = localStorage.getItem('sk_tour_v6_maxhp');
            const savedTotalRounds = localStorage.getItem('sk_tour_v6_totalrounds');

            if (savedMaxHp) {
                maxHp = parseInt(savedMaxHp);
                document.getElementById('max-hp-input').value = maxHp;
            } else {
                maxHp = defaultMaxHp;
            }

            if (savedTotalRounds) {
                totalRounds = parseInt(savedTotalRounds);
            } else {
                totalRounds = defaultTotalRounds;
            }

            if (savedPlayers) {
                participants = JSON.parse(savedPlayers);
            } else {
                // 網頁端初始化配置：全體歸零，建立指定局數的空矩陣
                participants = defaultParticipants.map(p => ({
                    name: p.name,
                    hp: p.hp,
                    roundScores: Array(totalRounds).fill(0)
                }));
            }

            // 防呆補齊局數
            participants.forEach(p => {
                if(!p.roundScores) p.roundScores = [];
                while(p.roundScores.length < totalRounds) {
                    p.roundScores.push(0);
                }
            });

            updateRoundDropdown();
            updateDataAndRender();
        }

        // 更新控制列的局數選單
        function updateRoundDropdown() {
            const select = document.getElementById('round-select');
            select.innerHTML = '';
            for (let i = 1; i <= totalRounds; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `第 ${i} 局`;
                if (i === currentRound) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function changeCurrentRound(val) {
            currentRound = parseInt(val);
            renderTopTable(); // 刷新按鈕文字提示
        }

        // ➕ 新增局數
        function addNewRound() {
            totalRounds++;
            participants.forEach(p => {
                p.roundScores.push(0); 
            });
            currentRound = totalRounds; 
            updateRoundDropdown();
            updateDataAndRender();
        }

        function saveToLocalStorage() {
            localStorage.setItem('sk_tour_v6_players', JSON.stringify(participants));
            localStorage.setItem('sk_tour_v6_maxhp', maxHp.toString());
            localStorage.setItem('sk_tour_v6_totalrounds', totalRounds.toString());
        }

        function resetToDefault() {
            if (confirm("確定要清除所有紀錄，重新開啟一場 10 局的新賽事嗎？")) {
                localStorage.removeItem('sk_tour_v6_players');
                localStorage.removeItem('sk_tour_v6_maxhp');
                localStorage.removeItem('sk_tour_v6_totalrounds');
                document.getElementById('max-hp-input').value = defaultMaxHp;
                totalRounds = defaultTotalRounds;
                currentRound = 1;
                init();
            }
        }

        function updateMaxHp(value) {
            let val = parseInt(value);
            if (!isNaN(val) && val > 0) {
                maxHp = val;
                saveToLocalStorage();
                renderTopTable(); 
                renderBottomTable();
            }
        }

        // 核心數據整合
        function updateDataAndRender() {
            calculateTotalAndRanks();
            // 核心排序：一律依照【血量由高到低】排列
            participants.sort((a, b) => b.hp - a.hp);
            
            renderTopTable();
            renderBottomTable();
            saveToLocalStorage();
        }

        // 計算總分與名次 (名次由累積總分決定)
        function calculateTotalAndRanks() {
            participants.forEach(p => {
                p.totalPoints = p.roundScores.reduce((sum, score) => sum + score, 0);
            });

            let sortedByPoints = [...participants].sort((a, b) => b.totalPoints - a.totalPoints);
            let currentRank = 1;
            
            for (let i = 0; i < sortedByPoints.length; i++) {
                if (i > 0 && sortedByPoints[i].totalPoints < sortedByPoints[i - 1].totalPoints) {
                    currentRank = i + 1;
                }
                let originalObj = participants.find(p => p.name === sortedByPoints[i].name);
                if (originalObj) {
                    originalObj.rank = currentRank;
                }
            }
        }

        // 數值增減
        function changeValue(name, type, amount) {
            let player = participants.find(p => p.name === name);
            if (player) {
                if (type === 'hp') {
                    player.hp += amount;
                    if (player.hp < 0) player.hp = 0; 
                } else if (type === 'points') {
                    player.roundScores[currentRound - 1] += amount;
                    if (player.roundScores[currentRound - 1] < 0) player.roundScores[currentRound - 1] = 0; 
                }
                updateDataAndRender();
            }
        }

        // ✏️ 自訂對話框
        function customEdit(name) {
            let player = participants.find(p => p.name === name);
            if (player) {
                let newHp = prompt(`請輸入【${player.name}】的最新血量：`, player.hp);
                if (newHp !== null && newHp.trim() !== "" && !isNaN(newHp)) {
                    player.hp = Math.max(0, parseInt(newHp));
                }

                let currentRoundScore = player.roundScores[currentRound - 1];
                let newScore = prompt(`請輸入【${player.name}】在【第 ${currentRound} 局】的得分：`, currentRoundScore);
                if (newScore !== null && newScore.trim() !== "" && !isNaN(newScore)) {
                    player.roundScores[currentRound - 1] = Math.max(0, parseInt(newScore));
                }
                
                updateDataAndRender();
            }
        }

        // 渲染上方表格（主面板）
        function renderTopTable() {
            const tbody = document.getElementById('top-table-body');
            tbody.innerHTML = '';

            participants.forEach(p => {
                const tr = document.createElement('tr');

                let rankClass = '';
                if (p.rank === 1) rankClass = 'rank-1';
                else if (p.rank === 2) rankClass = 'rank-2';
                else if (p.rank === 3) rankClass = 'rank-3';

                let hpPercent = Math.min((p.hp / maxHp) * 100, 100);
                if (hpPercent < 0) hpPercent = 0;

                tr.innerHTML = `
                    <td><strong>${p.name}</strong></td>
                    <td>
                        <span style="display:inline-block; width:35px; text-align:right; font-weight:bold;">${p.hp}</span>
                        <div class="hp-bar-container">
                            <div class="hp-bar" style="width: ${hpPercent}%;"></div>
                        </div>
                    </td>
                    <td style="font-weight: bold; color: #ffa502;">${p.totalPoints} 分</td>
                    <td class="${rankClass}">第 ${p.rank} 名</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-hp-add" onclick="changeValue('${p.name}', 'hp', 1)">+1 血</button>
                            <button class="btn-hp-sub" onclick="changeValue('${p.name}', 'hp', -1)">-1 血</button>
                            <button class="btn-pt-add" onclick="changeValue('${p.name}', 'points', 1)">+1 分 (局${currentRound})</button>
                            <button class="btn-pt-sub" onclick="changeValue('${p.name}', 'points', -1)">-1 分 (局${currentRound})</button>
                            <button class="btn-edit" onclick="customEdit('${p.name}')">✏️ 自訂</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 渲染下方表格（各局明細大表）
        function renderBottomTable() {
            // 1. 生成表頭
            const thead = document.getElementById('bottom-table-head');
            let headHtml = `<tr><th>參賽者</th>`;
            for (let i = 1; i <= totalRounds; i++) {
                headHtml += `<th>第 ${i} 局</th>`;
            }
            headHtml += `<th>總名次</th></tr>`;
            thead.innerHTML = headHtml;

            // 2. 生成內容
            const tbody = document.getElementById('bottom-table-body');
            tbody.innerHTML = '';

            participants.forEach(p => {
                const tr = document.createElement('tr');

                let rankClass = '';
                if (p.rank === 1) rankClass = 'rank-1';
                else if (p.rank === 2) rankClass = 'rank-2';
                else if (p.rank === 3) rankClass = 'rank-3';

                // 生成每局的分數 TD 串
                let scoresTdHtml = '';
                p.roundScores.forEach(score => {
                    let cellClass = score > 0 ? 'round-cell has-value' : 'round-cell';
                    scoresTdHtml += `<td class="${cellClass}">${score}</td>`;
                });

                tr.innerHTML = `
                    <td><strong>${p.name}</strong></td>
                    ${scoresTdHtml}
                    <td class="${rankClass}">第 ${p.rank} 名</td>
                `;
                tbody.appendChild(tr);
            });
        }

        init();
    </script>
</body>
</html>
